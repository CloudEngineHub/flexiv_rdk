name: CI-Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci-python:
    name: CI-Python @ ${{ matrix.os }} (${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-22.04-arm
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-14
          - windows-2022
        python-version:
          - "3.10"
          - "3.12"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/workflows/shared_python_steps
        with:
          python-version: ${{ matrix.python-version }}
