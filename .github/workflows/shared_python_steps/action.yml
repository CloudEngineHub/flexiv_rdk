name: "Shared Check Steps for Python"
inputs:
  python-version:
    description: "Python version used for example compilation checks"
    required: true
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install latest flexivrdk
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install flexivrdk

    - name: Byte-compile Python examples
      shell: bash
      run: |
        python - <<'PY'
        from pathlib import Path
        import py_compile

        root = Path('example_py')
        files = sorted(
            path for path in root.glob('*.py')
            if path.name.startswith('basics') or path.name.startswith('intermediate')
        )

        for path in files:
            py_compile.compile(str(path), doraise=True)
            print(f'py_compile OK: {path}')
        PY

    - name: Run unit tests
      shell: bash
      run: |
        python test/test_robot_constructor.py -v